<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexoRain</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#06172f,#0b2f5a,#103d74);
color:white;
text-align:center;
}

.header{
padding:30px 20px;
}

.header h1{
font-size:42px;
margin:0;
color:#5ec8ff;
}

.header p{
font-size:18px;
color:#cfefff;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:20px;
}

.card{
background:#123b68;
border-radius:20px;
padding:20px;
box-shadow:0 0 12px rgba(0,0,0,.4);
}

.card h2{
margin:0;
font-size:22px;
}

.card p{
font-size:14px;
color:#d7e8ff;
}

button{
margin-top:10px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:#00b4ff;
color:white;
}

.footer{
padding:25px;
font-size:18px;
color:#9fdcff;
}
</style>
</head>

<body>

<div class="header">
<h1>NEXORAIN</h1>
<p>Rain • Waterfall • Ocean • Forest</p>
</div>

<div class="menu">

<div class="card">
<h2>🌧 Rain Sounds</h2>
<p>Relax with peaceful rain.</p>
<button>Open</button>
</div>

<div class="card">
<h2>🌊 Waterfall</h2>
<p>Enjoy natural waterfall sounds.</p>
<button>Open</button>
</div>

<div class="card">
<h2>🌊 Ocean</h2>
<p>Listen to calm ocean waves.</p>
<button>Open</button>
</div>

<div class="card">
<h2>🌲 Forest</h2>
<p>Peaceful forest ambience.</p>
<button>Open</button>
</div>

</div>

<div class="footer">
Sleep Better • Feel Nature 🌙
</div>

</body>
</html
